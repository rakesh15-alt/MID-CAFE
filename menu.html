<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#EBF5F0;

padding:50px 7%;

}

h1{

text-align:center;

font-size:3rem;

margin-bottom:50px;

font-family:'Cinzel',serif;

color:#58704d;
}

.section-title{

font-size:2rem;

margin:50px 0 30px;

color:#58704d;
}

.grid{

display:grid;

grid-template-columns:repeat(5,1fr);

gap:20px;
}

.card{

background:white;

border-radius:25px;

overflow:hidden;

transition:0.5s;

box-shadow:0 0 15px rgba(0,0,0,0.08);
}

.card:hover{

transform:translateY(-10px);
}

.card img{

width:100%;
height:220px;

object-fit:cover;
}

.info{

padding:18px;
}

.info h3{

margin-bottom:10px;
}

.price{

color:#58704d;

font-weight:bold;
}

.back{

display:flex;
justify-content:center;

margin-top:60px;
}

.back a{

text-decoration:none;

padding:14px 35px;

background:#9cc38c;

color:#1d2b1f;

border-radius:40px;

font-weight:bold;
}

/* MOBILE */

@media(max-width:768px){

.grid{

grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<h1>
Leaf Garden Menu
</h1>

<h2 class="section-title">
Coffee
</h2>

<div class="grid">

<div class="card">
<img src="images/coffee3.jpeg">
<div class="info">
<h3>Cappuccino</h3>
<p class="price">₹249</p>
</div>
</div>

<div class="card">
<img src="images/coffee4.jpeg">
<div class="info">
<h3>Latte</h3>
<p class="price">₹299</p>
</div>
</div>

<div class="card">
<img src="images/coffee5.jpeg">
<div class="info">
<h3>Espresso</h3>
<p class="price">₹199</p>
</div>
</div>

</div>

<h2 class="section-title">
Desserts
</h2>

<div class="grid">

<div class="card">
<img src="images/deserts4.jpeg">
<div class="info">
<h3>Chocolate Cake</h3>
<p class="price">₹399</p>
</div>
</div>

<div class="card">
<img src="images/deserts5.jpeg">
<div class="info">
<h3>Brownie</h3>
<p class="price">₹299</p>
</div>
</div>

</div>

<h2 class="section-title">
Snacks
</h2>

<div class="grid">

<div class="card">
<img src="images/snacks3.jpeg">
<div class="info">
<h3>French Fries</h3>
<p class="price">₹199</p>
</div>
</div>

<div class="card">
<img src="images/snacks6.jpeg">
<div class="info">
<h3>Veg Burger</h3>
<p class="price">₹349</p>
</div>
</div>

</div>

<div class="back">

<a href="index.html">
⬅ Back To Home
</a>

</div>

</body>
</html>
